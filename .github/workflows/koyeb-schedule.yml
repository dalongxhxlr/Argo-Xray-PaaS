name: koyeb-auto-start-stop

on:
  schedule:
    - cron: '0 1 * * *'   # 09:00 开（UTC 01:00）
    - cron: '0 15 * * *'  # 23:00 关（UTC 15:00）
  workflow_dispatch:

jobs:
  control:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decide action
        id: decide
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "01" ]; then
            echo "action=start" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "15" ]; then
            echo "action=stop" >> $GITHUB_OUTPUT
          else
            echo "action=none" >> $GITHUB_OUTPUT
          fi

      - name: Load and update monthly usage
        id: usage
        run: |
          FILE="platform_limits.json"

          # 读取字段
          LIMIT=$(sed -n 's/.*"monthly_limit_hours": \([0-9]*\).*/\1/p' $FILE)
          USED=$(sed -n 's/.*"usage_hours": \([0-9]*\).*/\1/p' $FILE)
          YEAR=$(sed -n 's/.*"year": \([0-9]*\).*/\1/p' $FILE)
          MONTH=$(sed -n 's/.*"month": \([0-9]*\).*/\1/p' $FILE)

          NOW_YEAR=$(date +%Y)
          NOW_MONTH=$(date +%m | sed 's/^0//')

          # 月份变化 → 自动重置
          if [ "$YEAR" != "$NOW_YEAR" ] || [ "$MONTH" != "$NOW_MONTH" ]; then
            echo "New month detected. Resetting usage."
            USED=0
            YEAR=$NOW_YEAR
            MONTH=$NOW_MONTH
          fi

          # 写回（先不加 usage）
          sed -i "s/\"usage_hours\": [0-9]*/\"usage_hours\": $USED/" $FILE
          sed -i "s/\"year\": [0-9]*/\"year\": $YEAR/" $FILE
          sed -i "s/\"month\": [0-9]*/\"month\": $MONTH/" $FILE

          echo "limit=$LIMIT" >> $GITHUB_OUTPUT
          echo "used=$USED" >> $GITHUB_OUTPUT

      - name: Check monthly limit
        if: steps.decide.outputs.action == 'start'
        run: |
          LIMIT=${{ steps.usage.outputs.limit }}
          USED=${{ steps.usage.outputs.used }}

          if [ "$USED" -ge "$LIMIT" ]; then
            echo "Monthly limit reached ($USED / $LIMIT). Will NOT start service."
            exit 0
          fi

      - name: Start service (with retry)
        if: steps.decide.outputs.action == 'start'
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_SERVICE: ${{ secrets.KOYEB_SERVICE }}
        run: |
          echo "Starting service..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer $KOYEB_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"scaling":{"min":1,"max":1}}' \
              "https://app.koyeb.com/v1/services/$KOYEB_SERVICE")

            if [ "$STATUS" = "200" ]; then
              echo "Service started successfully."
              exit 0
            fi

            echo "Attempt $i failed (HTTP $STATUS), retrying in 5s..."
            sleep 5
          done

          echo "Failed to start service after 3 attempts."
          exit 1

      - name: Stop service (with retry)
        if: steps.decide.outputs.action == 'stop'
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_SERVICE: ${{ secrets.KOYEB_SERVICE }}
        run: |
          echo "Stopping service..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer $KOYEB_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"scaling":{"min":0,"max":0}}' \
              "https://app.koyeb.com/v1/services/$KOYEB_SERVICE")

            if [ "$STATUS" = "200" ]; then
              echo "Service stopped successfully."
              exit 0
            fi

            echo "Attempt $i failed (HTTP $STATUS), retrying in 5s..."
            sleep 5
          done

          echo "Failed to stop service after 3 attempts."
          exit 1

      - name: Add 1 hour usage when stopped
        if: steps.decide.outputs.action == 'stop'
        run: |
          FILE="platform_limits.json"
          USED=$(sed -n 's/.*"usage_hours": \([0-9]*\).*/\1/p' $FILE)
          NEW=$((USED + 1))
          sed -i "s/\"usage_hours\": [0-9]*/\"usage_hours\": $NEW/" $FILE
          echo "Updated usage: $USED → $NEW"

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update usage hours"
          file_pattern: platform_limits.json
