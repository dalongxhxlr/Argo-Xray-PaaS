name: koyeb-worker-auto

on:
  schedule:
    - cron: '0 1 * * *'   # 09:00 CST 启动服务（UTC 01:00）
    - cron: '0 15 * * *'  # 23:00 CST 停止服务（UTC 15:00）
  workflow_dispatch:
    inputs:
      manual_action:
        description: '手动控制动作用'
        required: false
        default: 'sync'

jobs:
  control:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decide action
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.manual_action }}" >> $GITHUB_OUTPUT
          else
            # 使用 %-H 获取没有前导零的小时数（0-23），方便进行数值比较
            HOUR=$(date -u +%-H)
            
            # 如果当前时间在 UTC 01:00 (北京09:00) 到 14:59 之间，目标状态应为 start
            if [ "$HOUR" -ge 1 ] && [ "$HOUR" -lt 15 ]; then
              echo "action=start" >> $GITHUB_OUTPUT
            else
              # 其他时间段，目标状态应为 stop
              echo "action=stop" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Load and Check Limits
        id: usage
        run: |
          FILE="platform_limits.json"
          LIMIT=$(jq '.koyeb.monthly_limit_hours' $FILE)
          USED=$(jq '.koyeb.usage_hours' $FILE)
          YEAR=$(jq '.koyeb.year' $FILE)
          MONTH=$(jq '.koyeb.month' $FILE)

          NOW_YEAR=$(date +%Y)
          NOW_MONTH=$(date +%-m)

          # 月初自动重置所有记账指标
          if [ "$YEAR" != "$NOW_YEAR" ] || [ "$MONTH" != "$NOW_MONTH" ]; then
            echo "⚠️ 检测到新月份，自动重置所有度量数据"
            jq ".koyeb.usage_hours = 0 | .koyeb.year = $NOW_YEAR | .koyeb.month = $NOW_MONTH | .koyeb.estimated_cost = 0 | .koyeb.last_start_time = null" $FILE > tmp.json && mv tmp.json $FILE
            USED=0
          fi

          echo "limit=$LIMIT" >> $GITHUB_OUTPUT
          echo "used=$USED" >> $GITHUB_OUTPUT
          echo "📊 当前月度已累计使用: $USED / 限额保护阀值: $LIMIT 小时"

      - name: Start Worker
        if: steps.decide.outputs.action == 'start' && steps.usage.outputs.used < steps.usage.outputs.limit
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_SERVICE: ${{ secrets.KOYEB_SERVICE }}
        run: |
          FILE="platform_limits.json"
          CURRENT_START=$(jq -r '.koyeb.last_start_time' $FILE)
          
          if [ "$CURRENT_START" != "null" ]; then
            echo "⚠️ 服务已经在运行时间段内 (存在启动时间戳: $CURRENT_START)，跳过重复启动。"
          else
            echo "🚀 额度安全，正在启动 Koyeb 代理实例..."
            curl -X POST -H "Authorization: Bearer $KOYEB_TOKEN" "https://app.koyeb.com/v1/services/$KOYEB_SERVICE/resume"
            
            # 在 JSON 中记录下本次启动的精确时间戳
            NOW_TS=$(date +%s)
            jq ".koyeb.last_start_time = $NOW_TS" $FILE > tmp.json && mv tmp.json $FILE
          fi

      - name: Stop Worker
        if: steps.decide.outputs.action == 'stop'
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_SERVICE: ${{ secrets.KOYEB_SERVICE }}
        run: |
          echo "⏸️ 正在暂停 Koyeb 实例以节约额度..."
          curl -X POST -H "Authorization: Bearer $KOYEB_TOKEN" "https://app.koyeb.com/v1/services/$KOYEB_SERVICE/pause"
          
          # 计算本次运行时间并执行「增量累加」
          FILE="platform_limits.json"
          NOW_TS=$(date +%s)
          START_TS=$(jq '.koyeb.last_start_time' $FILE)
          
          if [ "$START_TS" != "null" ] && [ "$START_TS" -gt 0 ]; then
            # 计算本次运行的秒数并转化为小时 (保留4位小数)
            ELAPSED_SEC=$((NOW_TS - START_TS))
            ELAPSED_HOURS=$(echo "scale=4; $ELAPSED_SEC / 3600" | bc)
            
            # 读取历史旧额度并加总
            OLD_HOURS=$(jq '.koyeb.usage_hours' $FILE)
            NEW_HOURS=$(echo "scale=4; $OLD_HOURS + $ELAPSED_HOURS" | bc)
            
            # 重新估算本月累计产生费用
            COST=$(echo "scale=4; $NEW_HOURS * 0.00216" | bc)
            
            # 更新写入文件，并清空本次启动时间戳
            jq ".koyeb.usage_hours = $NEW_HOURS | .koyeb.estimated_cost = $COST | .koyeb.last_start_time = null" $FILE > tmp.json && mv tmp.json $FILE
            
            echo "✅ 本次运行时长: $ELAPSED_HOURS 小时已成功累加。"
            echo "💰 本月累计预估费用变更为: $COST USD"
          else
            echo "⚠️ 未能找到配套的启动时间戳，跳过本次时长累加计算。"
          fi

      - name: Commit Updated Progress
        if: steps.decide.outputs.action == 'start' || steps.decide.outputs.action == 'stop'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动化记账: 同步最新用时与限额状态 [Skip CI]"
          file_pattern: platform_limits.json
