name: koyeb-debug

on:
  workflow_dispatch:   # 手动运行

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: 调用 Koyeb API 并打印完整返回
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_SERVICE: ${{ secrets.KOYEB_SERVICE }}
        run: |
          echo "正在调用 Koyeb API..."
          curl -s -H "Authorization: Bearer $KOYEB_TOKEN" \
            "https://app.koyeb.com/v1/services/$KOYEB_SERVICE" | jq .
